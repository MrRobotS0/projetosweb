<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Clima · Belinelo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-1: #0a0a1a;
      --bg-2: #050510;
      --glow-1: rgba(124, 92, 255, 0.30);
      --glow-2: rgba(0, 216, 255, 0.22);
      --glow-3: rgba(255, 78, 205, 0.18);
      --surface: rgba(255,255,255,0.05);
      --surface-2: rgba(255,255,255,0.10);
      --surface-3: rgba(255,255,255,0.14);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.20);
      --text: #ffffff;
      --text-dim: #cbd5e1;
      --text-dim-2: #94a3b8;
      --accent: #7c5cff;
      --accent-2: #00d8ff;
      --accent-grad: linear-gradient(135deg, #7c5cff, #00d8ff);
      --danger: #ff4c6a;
    }

    /* ============ CONDIÇÕES DINÂMICAS ============ */
    body[data-cond="clear-day"]   { --glow-1: rgba(255,184,77,0.35); --glow-2: rgba(0,180,255,0.25); --glow-3: rgba(255,107,107,0.18); }
    body[data-cond="clear-night"] { --glow-1: rgba(76,29,149,0.45); --glow-2: rgba(30,64,175,0.35); --glow-3: rgba(124,58,237,0.30); }
    body[data-cond="clouds"]      { --glow-1: rgba(100,116,139,0.40); --glow-2: rgba(148,163,184,0.25); --glow-3: rgba(71,85,105,0.30); }
    body[data-cond="rain"]        { --glow-1: rgba(37,99,235,0.40); --glow-2: rgba(14,165,233,0.30); --glow-3: rgba(99,102,241,0.25); }
    body[data-cond="thunderstorm"]{ --glow-1: rgba(76,29,149,0.55); --glow-2: rgba(217,70,239,0.30); --glow-3: rgba(250,204,21,0.18); }
    body[data-cond="snow"]        { --glow-1: rgba(186,230,253,0.40); --glow-2: rgba(125,211,252,0.30); --glow-3: rgba(240,249,255,0.25); }
    body[data-cond="mist"]        { --glow-1: rgba(148,163,184,0.40); --glow-2: rgba(203,213,225,0.30); --glow-3: rgba(100,116,139,0.25); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(1000px 600px at 15% 0%, var(--glow-1), transparent 60%),
        radial-gradient(900px 500px at 100% 20%, var(--glow-2), transparent 60%),
        radial-gradient(900px 700px at 50% 120%, var(--glow-3), transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      padding: 24px;
      transition: background 1s ease;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ============ TOP BAR ============ */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      transition: all .25s ease;
    }
    .back-link:hover {
      color: var(--text);
      border-color: var(--border-strong);
      transform: translateX(-2px);
    }
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .page-title .dot { color: var(--accent); }
    .topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .unit-toggle {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }
    .unit-toggle button {
      padding: 6px 12px;
      border: none; background: transparent;
      color: var(--text-dim);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border-radius: 7px;
      transition: all .2s ease;
      font-family: inherit;
    }
    .unit-toggle button.active {
      background: var(--accent-grad);
      color: white;
      box-shadow: 0 4px 12px -2px var(--glow-1);
    }

    .icon-btn {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s ease;
    }
    .icon-btn:hover {
      color: var(--text);
      background: var(--surface-2);
      border-color: var(--border-strong);
    }

    /* ============ SEARCH ============ */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 240px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      transition: all .25s ease;
    }
    .search-wrap input::placeholder { color: var(--text-dim-2); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface-2);
      box-shadow: 0 0 0 4px var(--glow-1);
    }
    .search-wrap svg {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim-2);
    }
    .btn {
      padding: 14px 22px;
      border-radius: 14px;
      border: none;
      background: var(--accent-grad);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all .25s ease;
      font-family: inherit;
      box-shadow: 0 8px 24px -8px var(--glow-1);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn.ghost {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: none;
    }
    .btn.ghost:hover { background: var(--surface-2); border-color: var(--border-strong); }

    /* Recent chips */
    .recent-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 28px;
      align-items: center;
    }
    .recent-label {
      font-size: 11px; color: var(--text-dim-2);
      text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 600; margin-right: 4px;
    }
    .recent-chip {
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s ease;
      font-family: inherit;
    }
    .recent-chip:hover {
      color: var(--text);
      border-color: var(--accent);
      background: var(--surface-2);
    }

    /* ============ CARDS ============ */
    .card {
      background: linear-gradient(160deg, var(--surface-2), var(--surface));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      transition: all .35s ease;
    }
    .card:hover { border-color: var(--border-strong); }

    /* HERO */
    .hero {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 800px) { .hero { grid-template-columns: 1fr; } }

    .hero-main {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 280px;
      position: relative;
      overflow: hidden;
    }
    .hero-main::after {
      content: "";
      position: absolute;
      right: -40px; top: -40px;
      width: 240px; height: 240px;
      background: var(--accent-grad);
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
    }
    .city-line {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .city-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-top: 4px;
    }
    .country-flag {
      font-size: 13px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .temp-row {
      display: flex; align-items: flex-start; gap: 16px;
      margin-top: 16px;
    }
    .weather-icon { width: 110px; height: 110px; }
    .temp-main {
      display: flex; flex-direction: column;
    }
    .temp-big {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.5rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #fff, #c5b8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .temp-desc {
      font-size: 1.1rem;
      color: var(--text-dim);
      text-transform: capitalize;
      margin-top: 4px;
    }
    .temp-feels {
      font-size: 13px;
      color: var(--text-dim-2);
      margin-top: 6px;
    }
    .temp-minmax {
      display: flex; gap: 12px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .temp-minmax .min { color: #7dd3fc; font-weight: 600; }
    .temp-minmax .max { color: #fb7185; font-weight: 600; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .stat-card {
      background: linear-gradient(160deg, var(--surface-2), var(--surface));
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      transition: all .25s ease;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
    }
    .stat-card .stat-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .stat-card .stat-icon {
      font-size: 1rem;
    }
    .stat-card .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .stat-card .stat-unit {
      font-size: 0.85rem;
      color: var(--text-dim-2);
      font-weight: 500;
      margin-left: 4px;
    }
    .stat-card .stat-sub {
      font-size: 12px;
      color: var(--text-dim-2);
      margin-top: 4px;
    }

    /* COMPASS */
    .compass {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      position: relative;
      margin: 4px 0 8px;
      flex-shrink: 0;
    }
    .compass::before, .compass::after {
      content: '';
      position: absolute;
      background: var(--text-dim-2);
    }
    .compass::before { top: 3px; left: 50%; width: 1px; height: 6px; transform: translateX(-50%); }
    .compass::after { bottom: 3px; left: 50%; width: 1px; height: 6px; transform: translateX(-50%); }
    .compass-n {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: var(--text-dim-2); font-weight: 600;
    }
    .compass-needle {
      position: absolute;
      top: 50%; left: 50%;
      width: 3px; height: 30px;
      background: linear-gradient(180deg, #fb7185 0%, #fb7185 50%, transparent 50%, transparent 100%);
      transform-origin: 50% 100%;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 9999px;
      transition: transform .6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .stat-wind {
      display: flex; gap: 14px; align-items: center;
    }
    .stat-wind-info { flex: 1; }

    /* Sun arc */
    .sun-arc {
      position: relative;
      height: 60px;
      margin: 8px 0 4px;
    }
    .sun-arc svg { width: 100%; height: 100%; }
    .sun-times {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-dim-2);
      margin-top: 4px;
    }

    /* ============ FORECASTS ============ */
    .row-2 {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 900px) { .row-2 { grid-template-columns: 1fr; } }

    .card-title {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 14px;
    }

    /* Daily forecast */
    .daily-list {
      display: flex; flex-direction: column;
      gap: 8px;
    }
    .daily-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all .2s ease;
    }
    .daily-row:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
    }
    .daily-day { font-weight: 600; font-size: 14px; text-transform: capitalize; }
    .daily-icon-desc { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 12px; }
    .daily-icon-desc img { width: 30px; height: 30px; }
    .daily-temp {
      display: flex; gap: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
    }
    .daily-temp .min { color: #7dd3fc; }
    .daily-temp .max { color: #fb7185; }

    /* Alert */
    .alert {
      display: none;
      align-items: flex-start; gap: 12px;
      padding: 14px 18px;
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 14px;
      margin-bottom: 20px;
      color: #fcd34d;
      font-size: 13px;
      line-height: 1.6;
    }
    .alert.show { display: flex; }
    .alert-icon { font-size: 1.4rem; flex-shrink: 0; }
    .alert-content strong { display: block; margin-bottom: 4px; color: #fef3c7; }

    /* Chart container */
    .chart-card {
      position: relative;
      min-height: 320px;
    }
    .chart-wrap { position: relative; height: 240px; }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .empty-state .ico {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-1);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 11px 18px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5);
      opacity: 0;
      transition: all .3s ease;
      z-index: 2000;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { border-color: var(--danger); color: #fda4af; }

    /* Fade in animation for content */
    .fade-in {
      animation: fadeUp .5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .topbar { gap: 10px; }
      .page-title { font-size: 1.25rem; }
      .card { padding: 16px; border-radius: 16px; }
      .stat-card { padding: 14px; }
      .stats-grid { gap: 10px; }
      .weather-icon { width: 80px; height: 80px; }
    }
  </style>
</head>

<body data-cond="clear-night">

  <div class="wrap">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="../index.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Voltar
        </a>
        <div class="page-title">🌡️ Clima<span class="dot">.</span></div>
      </div>
      <div class="topbar-actions">
        <div class="unit-toggle">
          <button class="active" data-unit="metric">°C</button>
          <button data-unit="imperial">°F</button>
        </div>
        <button class="icon-btn" id="btnGeo" title="Usar minha localização">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="3"/>
            <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
      <div class="search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="cityInput" type="text" placeholder="Digite uma cidade (Ex: São Paulo, Tokyo, New York...)" autocomplete="off" />
      </div>
      <button class="btn" id="btnSearch">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Buscar
      </button>
    </div>

    <div class="recent-row" id="recentRow"></div>

    <!-- ALERTAS -->
    <div class="alert" id="weatherAlert">
      <span class="alert-icon">⚠️</span>
      <div class="alert-content" id="alertContent"></div>
    </div>

    <!-- CONTENT -->
    <div id="content">
      <div class="empty-state">
        <div class="ico">🌤️</div>
        <h3>Descubra o clima de qualquer lugar</h3>
        <p>Digite uma cidade acima ou use sua localização atual.</p>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const apiKey = "f1a4663341886a370c047b8e0049b3f2";
    let unit = localStorage.getItem('weather-unit') || 'metric';
    let recent = JSON.parse(localStorage.getItem('weather-recent') || '[]');
    let forecastChart = null;

    const toast = document.getElementById('toast');
    function showToast(msg, isErr = false) {
      toast.textContent = msg;
      toast.classList.toggle('err', isErr);
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    // ============ UNIT TOGGLE ============
    document.querySelectorAll('.unit-toggle button').forEach(b => {
      if (b.dataset.unit === unit) {
        document.querySelectorAll('.unit-toggle button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      }
      b.addEventListener('click', () => {
        document.querySelectorAll('.unit-toggle button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        unit = b.dataset.unit;
        localStorage.setItem('weather-unit', unit);
        if (window.lastCity) fetchByCity(window.lastCity);
      });
    });

    // ============ SEARCH ============
    document.getElementById('btnSearch').addEventListener('click', () => {
      const c = document.getElementById('cityInput').value.trim();
      if (c) fetchByCity(c);
    });
    document.getElementById('cityInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const c = e.target.value.trim();
        if (c) fetchByCity(c);
      }
    });

    // ============ GEOLOCATION ============
    document.getElementById('btnGeo').addEventListener('click', () => {
      if (!navigator.geolocation) {
        showToast('Geolocalização não suportada', true);
        return;
      }
      showToast('Obtendo localização...');
      navigator.geolocation.getCurrentPosition(
        pos => fetchByCoords(pos.coords.latitude, pos.coords.longitude),
        () => showToast('Permissão de localização negada', true)
      );
    });

    // ============ RENDER RECENT ============
    function renderRecent() {
      const row = document.getElementById('recentRow');
      if (recent.length === 0) { row.innerHTML = ''; return; }
      row.innerHTML = '<span class="recent-label">Recentes</span>' +
        recent.map(c => `<button class="recent-chip" data-city="${c}">${c}</button>`).join('');
      row.querySelectorAll('.recent-chip').forEach(c => {
        c.addEventListener('click', () => fetchByCity(c.dataset.city));
      });
    }
    function addRecent(city) {
      recent = recent.filter(c => c.toLowerCase() !== city.toLowerCase());
      recent.unshift(city);
      recent = recent.slice(0, 6);
      localStorage.setItem('weather-recent', JSON.stringify(recent));
      renderRecent();
    }
    renderRecent();

    // ============ FETCH ============
    async function fetchByCity(city) {
      try {
        showLoading();
        const [cur, fc] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=${unit}&lang=pt_br&appid=${apiKey}`),
          fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=${unit}&lang=pt_br&appid=${apiKey}`)
        ]);
        if (!cur.ok) throw new Error('Cidade não encontrada');
        const curData = await cur.json();
        const fcData = await fc.json();
        addRecent(curData.name);
        window.lastCity = curData.name;
        render(curData, fcData);
      } catch (e) {
        showToast(e.message || 'Erro ao buscar dados', true);
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="ico">🔍</div>
            <h3>Cidade não encontrada</h3>
            <p>Verifique a grafia e tente novamente.</p>
          </div>`;
      }
    }
    async function fetchByCoords(lat, lon) {
      try {
        showLoading();
        const [cur, fc] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=${unit}&lang=pt_br&appid=${apiKey}`),
          fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=${unit}&lang=pt_br&appid=${apiKey}`)
        ]);
        const curData = await cur.json();
        const fcData = await fc.json();
        addRecent(curData.name);
        window.lastCity = curData.name;
        render(curData, fcData);
      } catch {
        showToast('Erro ao buscar dados', true);
      }
    }

    function showLoading() {
      document.getElementById('content').innerHTML = `
        <div class="hero">
          <div class="card hero-main"><div class="skeleton" style="height:240px;"></div></div>
          <div class="stats-grid">
            ${Array.from({length:4}).map(() => '<div class="stat-card"><div class="skeleton" style="height:80px;"></div></div>').join('')}
          </div>
        </div>`;
    }

    // ============ CONDITION MAPPING ============
    function getCondition(weatherId, icon) {
      const isNight = icon && icon.endsWith('n');
      if (weatherId >= 200 && weatherId < 300) return 'thunderstorm';
      if (weatherId >= 300 && weatherId < 600) return 'rain';
      if (weatherId >= 600 && weatherId < 700) return 'snow';
      if (weatherId >= 700 && weatherId < 800) return 'mist';
      if (weatherId === 800) return isNight ? 'clear-night' : 'clear-day';
      if (weatherId > 800) return 'clouds';
      return 'clear-night';
    }

    // ============ RENDER ============
    function render(cur, fc) {
      const cond = getCondition(cur.weather[0].id, cur.weather[0].icon);
      document.body.setAttribute('data-cond', cond);

      const tempU = unit === 'metric' ? '°C' : '°F';
      const speedU = unit === 'metric' ? 'm/s' : 'mph';

      const sunrise = new Date(cur.sys.sunrise * 1000);
      const sunset = new Date(cur.sys.sunset * 1000);
      const now = new Date();
      const dayProgress = Math.max(0, Math.min(1, (now - sunrise) / (sunset - sunrise)));

      const windDir = cur.wind.deg || 0;
      const windCardinal = degToCardinal(windDir);

      const visKm = (cur.visibility / 1000).toFixed(1);
      const cloudPct = cur.clouds?.all ?? 0;

      // ====== HERO + STATS ======
      const heroHTML = `
        <div class="hero fade-in">
          <div class="card hero-main">
            <div>
              <div class="city-line">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
                <span>${new Date().toLocaleString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', hour: '2-digit', minute: '2-digit' })}</span>
                <span class="country-flag">${cur.sys.country}</span>
              </div>
              <div class="city-name">${cur.name}</div>
            </div>
            <div class="temp-row">
              <img class="weather-icon" src="https://openweathermap.org/img/wn/${cur.weather[0].icon}@4x.png" alt="${cur.weather[0].description}" />
              <div class="temp-main">
                <div class="temp-big">${Math.round(cur.main.temp)}<span style="font-size:.5em;opacity:.6">${tempU}</span></div>
                <div class="temp-desc">${cur.weather[0].description}</div>
                <div class="temp-feels">Sensação ${Math.round(cur.main.feels_like)}${tempU}</div>
                <div class="temp-minmax">
                  <span><span class="min">↓ ${Math.round(cur.main.temp_min)}${tempU}</span></span>
                  <span><span class="max">↑ ${Math.round(cur.main.temp_max)}${tempU}</span></span>
                </div>
              </div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label"><span class="stat-icon">💧</span>Umidade</div>
              <div class="stat-value">${cur.main.humidity}<span class="stat-unit">%</span></div>
              <div class="stat-sub">${cur.main.humidity > 70 ? 'Ar úmido' : cur.main.humidity < 30 ? 'Ar seco' : 'Confortável'}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label"><span class="stat-icon">💨</span>Vento</div>
              <div class="stat-wind">
                <div class="compass">
                  <span class="compass-n">N</span>
                  <div class="compass-needle" style="transform: translate(-50%, -100%) rotate(${windDir}deg);"></div>
                </div>
                <div class="stat-wind-info">
                  <div class="stat-value">${cur.wind.speed.toFixed(1)}<span class="stat-unit">${speedU}</span></div>
                  <div class="stat-sub">${windCardinal} · ${windDir}°</div>
                </div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-label"><span class="stat-icon">📊</span>Pressão</div>
              <div class="stat-value">${cur.main.pressure}<span class="stat-unit">hPa</span></div>
              <div class="stat-sub">${cur.main.pressure > 1015 ? 'Alta' : cur.main.pressure < 1005 ? 'Baixa' : 'Normal'}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label"><span class="stat-icon">👁️</span>Visibilidade</div>
              <div class="stat-value">${visKm}<span class="stat-unit">km</span></div>
              <div class="stat-sub">Nuvens ${cloudPct}%</div>
            </div>
          </div>
        </div>

        <div class="row-2 fade-in">
          <div class="card chart-card">
            <div class="card-title">📈 Previsão das próximas horas</div>
            <div class="chart-wrap"><canvas id="forecastChart"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">☀️ Sol</div>
            <div class="sun-arc">
              <svg viewBox="0 0 200 70" preserveAspectRatio="none">
                <path d="M 10 60 Q 100 -10, 190 60" stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
                <path d="M 10 60 Q 100 -10, 190 60" stroke="url(#sunGrad)" stroke-width="2" fill="none"
                      stroke-dasharray="${getArcLength()}" stroke-dashoffset="${getArcLength() * (1 - dayProgress)}"/>
                <circle cx="${10 + (190-10)*dayProgress}" cy="${getSunY(dayProgress)}" r="6" fill="#fbbf24" filter="drop-shadow(0 0 8px #fbbf24)"/>
                <defs>
                  <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0" stop-color="#fb923c"/>
                    <stop offset="1" stop-color="#fbbf24"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <div class="sun-times">
              <span>🌅 ${sunrise.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
              <span>🌇 ${sunset.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div class="card-title" style="margin-top:18px;">🌡️ Hoje</div>
            <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-dim)">
              <span>Mín ${Math.round(cur.main.temp_min)}${tempU}</span>
              <span>Máx ${Math.round(cur.main.temp_max)}${tempU}</span>
            </div>
          </div>
        </div>

        <div class="card fade-in">
          <div class="card-title">📅 Previsão para 5 dias</div>
          <div class="daily-list" id="dailyList"></div>
        </div>
      `;

      document.getElementById('content').innerHTML = heroHTML;

      renderChart(fc);
      renderDaily(fc);

      // Alertas simples baseados em condições
      const alertBox = document.getElementById('weatherAlert');
      const alertContent = document.getElementById('alertContent');
      const alerts = [];
      if (cur.main.temp > (unit === 'metric' ? 35 : 95)) alerts.push({ title: 'Calor extremo', msg: 'Temperatura muito alta. Mantenha-se hidratado.' });
      if (cur.main.temp < (unit === 'metric' ? 5 : 41)) alerts.push({ title: 'Frio intenso', msg: 'Temperatura muito baixa. Agasalhe-se bem.' });
      if (cur.wind.speed > (unit === 'metric' ? 15 : 33)) alerts.push({ title: 'Vento forte', msg: `Rajadas de ${cur.wind.speed.toFixed(1)} ${speedU}.` });
      if (cur.weather[0].id >= 200 && cur.weather[0].id < 300) alerts.push({ title: 'Tempestade', msg: 'Há trovoadas na região. Evite áreas abertas.' });
      if (alerts.length) {
        alertContent.innerHTML = alerts.map(a => `<strong>${a.title}</strong>${a.msg}`).join('<br><br>');
        alertBox.classList.add('show');
      } else {
        alertBox.classList.remove('show');
      }
    }

    // SVG arc helpers
    function getArcLength() { return 230; } // aproximação fixa
    function getSunY(p) {
      // Quadratic bezier: y = (1-t)²·60 + 2(1-t)t·(-10) + t²·60
      return Math.pow(1-p,2)*60 + 2*(1-p)*p*(-10) + p*p*60;
    }

    function degToCardinal(deg) {
      const dirs = ['N','NE','L','SE','S','SO','O','NO'];
      return dirs[Math.round(deg / 45) % 8];
    }

    // ============ CHART ============
    function renderChart(fc) {
      const slice = fc.list.slice(0, 8);
      const labels = slice.map(i => new Date(i.dt * 1000).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}));
      const temps = slice.map(i => i.main.temp);
      const ctx = document.getElementById('forecastChart').getContext('2d');
      if (forecastChart) forecastChart.destroy();

      const grad = ctx.createLinearGradient(0, 0, 0, 240);
      grad.addColorStop(0, 'rgba(124,92,255,0.45)');
      grad.addColorStop(1, 'rgba(0,216,255,0)');

      forecastChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: `Temp ${unit === 'metric' ? '°C' : '°F'}`,
            data: temps,
            borderColor: '#7c5cff',
            backgroundColor: grad,
            fill: true,
            tension: 0.45,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#7c5cff',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6,
            borderWidth: 2.5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(10,10,26,0.95)',
              borderColor: 'rgba(124,92,255,0.5)',
              borderWidth: 1,
              titleColor: '#fff',
              bodyColor: '#cbd5e1',
              padding: 10,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                label: ctx => ` ${ctx.parsed.y.toFixed(1)}${unit === 'metric' ? '°C' : '°F'}`
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#94a3b8', font: { size: 11 } }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#94a3b8', font: { size: 11 }, callback: v => v + '°' }
            }
          }
        }
      });
    }

    // ============ DAILY ============
    function renderDaily(fc) {
      // Agrupa por dia, pega o item mais próximo do meio-dia
      const byDay = {};
      fc.list.forEach(item => {
        const d = new Date(item.dt * 1000);
        const key = d.toISOString().slice(0, 10);
        if (!byDay[key]) byDay[key] = [];
        byDay[key].push(item);
      });
      const days = Object.keys(byDay).slice(0, 5);
      const today = new Date().toISOString().slice(0, 10);
      const tempU = unit === 'metric' ? '°C' : '°F';

      const html = days.map(key => {
        const items = byDay[key];
        const midday = items.reduce((best, cur) => {
          const h = new Date(cur.dt * 1000).getHours();
          return Math.abs(h - 12) < Math.abs(new Date(best.dt * 1000).getHours() - 12) ? cur : best;
        }, items[0]);
        const min = Math.min(...items.map(i => i.main.temp_min));
        const max = Math.max(...items.map(i => i.main.temp_max));
        const d = new Date(key + 'T12:00:00');
        const label = key === today ? 'Hoje' :
                      d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'short' });
        return `
          <div class="daily-row">
            <div class="daily-day">${label}</div>
            <div class="daily-icon-desc">
              <img src="https://openweathermap.org/img/wn/${midday.weather[0].icon}@2x.png" alt="" />
              <span>${midday.weather[0].description}</span>
            </div>
            <div class="daily-temp">
              <span class="min">${Math.round(min)}${tempU}</span>
              <span class="max">${Math.round(max)}${tempU}</span>
            </div>
          </div>`;
      }).join('');
      document.getElementById('dailyList').innerHTML = html;
    }

    // ============ INIT ============
    if (recent.length > 0) {
      fetchByCity(recent[0]);
    }
  </script>
</body>
</html>
