<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendário · Belinelo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>

  <style>
    :root[data-theme="dark"] {
      --bg-1: #0a0a1a;
      --bg-2: #050510;
      --glow-1: rgba(124, 92, 255, 0.35);
      --glow-2: rgba(0, 216, 255, 0.25);
      --glow-3: rgba(255, 78, 205, 0.2);
      --surface: rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.08);
      --surface-3: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --text: #ffffff;
      --text-dim: #94a3b8;
      --text-dim-2: #64748b;
      --accent: #7c5cff;
      --accent-2: #00d8ff;
      --accent-grad: linear-gradient(135deg, #7c5cff, #00d8ff);
      --danger: #ff4c6a;
      --success: #22c55e;
      --warn: #fbbf24;
    }
    :root[data-theme="light"] {
      --bg-1: #f5f5fa;
      --bg-2: #e8e8f0;
      --glow-1: rgba(99,102,241,0.15);
      --glow-2: rgba(14,165,233,0.1);
      --glow-3: rgba(236,72,153,0.08);
      --surface: rgba(255,255,255,0.7);
      --surface-2: rgba(255,255,255,0.9);
      --surface-3: rgba(255,255,255,1);
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.18);
      --text: #0f172a;
      --text-dim: #475569;
      --text-dim-2: #94a3b8;
      --accent: #6366f1;
      --accent-2: #0ea5e9;
      --accent-grad: linear-gradient(135deg, #6366f1, #0ea5e9);
      --danger: #e11d48;
      --success: #16a34a;
      --warn: #d97706;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    body {
      height: 100vh;
      width: 100vw;
      background:
        radial-gradient(900px 500px at 15% 0%, var(--glow-1), transparent 60%),
        radial-gradient(700px 500px at 100% 20%, var(--glow-2), transparent 60%),
        radial-gradient(800px 600px at 50% 120%, var(--glow-3), transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      transition: background 0.4s ease, color 0.3s ease;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============ TOP BAR ============ */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 5;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      transition: all .25s ease;
    }
    .back-link:hover {
      color: var(--text);
      border-color: var(--border-strong);
      transform: translateX(-2px);
    }
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .page-title .dot { color: var(--accent); }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all .2s ease;
      font-family: inherit;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .btn.primary {
      background: var(--accent-grad);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 20px -6px var(--glow-1);
    }
    .btn.primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .icon-btn {
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s ease;
    }
    .icon-btn:hover {
      color: var(--text);
      border-color: var(--border-strong);
      background: var(--surface-2);
    }

    /* ============ STAGE ============ */
    .stage {
      flex: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 14px;
      min-height: 0;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .stage { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* SIDEBAR */
    .sidebar {
      background: linear-gradient(160deg, var(--surface-2), var(--surface));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
      overflow: hidden;
    }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .stat .num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .stat .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .search-wrap { position: relative; flex-shrink: 0; }
    .search-wrap input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      transition: all .2s ease;
    }
    .search-wrap input::placeholder { color: var(--text-dim-2); }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface-2);
      box-shadow: 0 0 0 3px var(--glow-1);
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim-2);
    }

    .filter-section { flex-shrink: 0; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .type-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      border-radius: 9999px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s ease;
      font-family: inherit;
    }
    .chip:hover { color: var(--text); border-color: var(--border-strong); }
    .chip.active {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .chip .dot {
      width: 8px; height: 8px; border-radius: 9999px;
    }

    .upcoming { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .upcoming-list {
      flex: 1; min-height: 0;
      overflow-y: auto;
      display: flex; flex-direction: column;
      gap: 6px;
      padding-right: 4px;
    }
    .upcoming-list::-webkit-scrollbar { width: 6px; }
    .upcoming-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 9999px; }

    .event-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 9px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
    }
    .event-item:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
      transform: translateX(2px);
    }
    .event-item .stripe {
      position: absolute; left: 0; top: 8px; bottom: 8px;
      width: 3px; border-radius: 9999px;
      background: var(--accent);
    }
    .event-item .ev-content { flex: 1; min-width: 0; padding-left: 6px; }
    .event-item .ev-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-item .ev-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .event-item .ev-icon {
      font-size: 1rem;
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .empty-state {
      text-align: center;
      padding: 30px 16px;
      color: var(--text-dim-2);
      font-size: 13px;
      font-style: italic;
    }

    /* ============ MAIN CALENDAR ============ */
    .cal-panel {
      background: linear-gradient(160deg, var(--surface-2), var(--surface));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #calendar {
      flex: 1;
      min-height: 0;
    }

    /* === FullCalendar customizations === */
    .fc {
      --fc-border-color: var(--border);
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: var(--surface);
      --fc-neutral-text-color: var(--text);
      --fc-today-bg-color: rgba(124,92,255,0.08);
      --fc-event-text-color: white;
      --fc-list-event-hover-bg-color: var(--surface-2);
      height: 100%;
      font-family: 'Inter', sans-serif;
    }
    .fc .fc-toolbar.fc-header-toolbar {
      margin-bottom: 14px;
      gap: 8px;
    }
    .fc .fc-toolbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem !important;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .fc .fc-button-group { gap: 4px; }
    .fc .fc-button {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      padding: 6px 12px !important;
      font-size: 12px !important;
      font-weight: 500 !important;
      border-radius: 8px !important;
      box-shadow: none !important;
      text-transform: capitalize !important;
      transition: all .2s ease;
    }
    .fc .fc-button:hover {
      background: var(--surface-2) !important;
      border-color: var(--border-strong) !important;
    }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background: var(--accent-grad) !important;
      border-color: transparent !important;
      color: white !important;
    }
    .fc .fc-button-primary:disabled {
      opacity: 0.5;
    }
    .fc-theme-standard td, .fc-theme-standard th {
      border-color: var(--border) !important;
    }
    .fc-theme-standard .fc-scrollgrid {
      border-color: var(--border) !important;
      border-radius: 12px;
      overflow: hidden;
    }
    .fc .fc-col-header-cell-cushion,
    .fc .fc-daygrid-day-number,
    .fc .fc-list-day-cushion,
    .fc .fc-timegrid-axis-cushion,
    .fc .fc-timegrid-slot-label-cushion {
      color: var(--text) !important;
    }
    .fc .fc-col-header-cell {
      background: var(--surface);
      padding: 8px 0;
    }
    .fc .fc-col-header-cell-cushion {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--text-dim) !important;
    }
    .fc .fc-daygrid-day-number {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 8px !important;
    }
    .fc .fc-day-today .fc-daygrid-day-number {
      background: var(--accent-grad);
      color: white !important;
      border-radius: 9999px;
      width: 26px; height: 26px;
      display: inline-flex !important;
      align-items: center; justify-content: center;
      padding: 0 !important;
      margin: 4px;
    }
    .fc .fc-daygrid-day.fc-day-other { opacity: 0.4; }
    .fc-daygrid-event {
      border-radius: 6px !important;
      padding: 2px 6px !important;
      font-size: 11px !important;
      font-weight: 500 !important;
      border: none !important;
      margin: 1px 3px !important;
    }
    .fc-event {
      cursor: pointer;
      transition: transform .15s ease;
    }
    .fc-event:hover { transform: scale(1.02); }
    .fc-list-event-title a { color: var(--text) !important; }
    .fc-list-day-cushion {
      background: var(--surface) !important;
    }
    .fc-list-event:hover td { background: var(--surface-2) !important; }
    .fc-list-empty {
      background: transparent !important;
      color: var(--text-dim) !important;
    }
    .fc .fc-timegrid-slot {
      height: 32px !important;
    }

    /* ============ MODAL ============ */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 1000;
      padding: 20px;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: linear-gradient(160deg, var(--bg-1), var(--bg-2));
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      width: 100%; max-width: 440px;
      box-shadow: 0 30px 80px -10px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
      transform: translateY(20px) scale(0.96);
      transition: transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }
    .modal-backdrop.show .modal { transform: translateY(0) scale(1); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      width: 30px; height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.4rem;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .2s ease;
    }
    .modal-close:hover { background: var(--surface); color: var(--text); }
    .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .field input, .field select {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: all .2s ease;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface-2);
      box-shadow: 0 0 0 3px var(--glow-1);
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .color-picker { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .color-dot {
      width: 28px; height: 28px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .2s ease;
      position: relative;
    }
    .color-dot:hover { transform: scale(1.1); }
    .color-dot.active {
      border-color: var(--text);
      box-shadow: 0 0 0 2px var(--bg-1), 0 0 0 4px var(--accent);
    }

    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    .btn-danger {
      background: rgba(255,76,106,0.12);
      color: var(--danger);
      border: 1px solid rgba(255,76,106,0.3);
    }
    .btn-danger:hover { background: rgba(255,76,106,0.2); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-1);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5);
      opacity: 0;
      transition: all .3s ease;
      z-index: 2000;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Confirm modal (small) */
    .confirm-modal { max-width: 360px; }
    .confirm-body { padding: 22px 20px; text-align: center; font-size: 14px; color: var(--text-dim); }
    .confirm-icon {
      width: 56px; height: 56px;
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,76,106,0.12);
      color: var(--danger);
      font-size: 1.6rem;
    }

    /* Flatpickr customization */
    .flatpickr-calendar {
      background: var(--bg-1) !important;
      border: 1px solid var(--border-strong) !important;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5) !important;
    }

    @media (max-width: 600px) {
      body { padding: 12px; gap: 10px; }
      .page-title { font-size: 1.15rem; }
      .btn { padding: 7px 10px; font-size: 12px; }
      .cal-panel { padding: 12px; }
      .fc .fc-toolbar-title { font-size: 1rem !important; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Voltar
      </a>
      <div class="page-title">📅 Calendário<span class="dot">.</span></div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="btnTheme" title="Alternar tema">
        <svg id="iconTheme" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button class="icon-btn" id="btnExport" title="Exportar (.ics)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
      </button>
      <button class="btn primary" id="btnAdd">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Novo Evento
      </button>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="stats">
        <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
        <div class="stat"><div class="num" id="statMonth">0</div><div class="label">Este mês</div></div>
      </div>

      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Buscar evento..." />
      </div>

      <div class="filter-section">
        <div class="section-label">Filtrar por tipo</div>
        <div class="type-chips" id="typeChips">
          <button class="chip active" data-type=""><span>Todos</span></button>
          <button class="chip" data-type="reuniao"><span class="dot" style="background:#7c5cff"></span>Reunião</button>
          <button class="chip" data-type="entrega"><span class="dot" style="background:#22c55e"></span>Entrega</button>
          <button class="chip" data-type="aniversario"><span class="dot" style="background:#ff4c6a"></span>Aniversário</button>
          <button class="chip" data-type="outro"><span class="dot" style="background:#fbbf24"></span>Outro</button>
        </div>
      </div>

      <div class="upcoming">
        <div class="section-label">Próximos eventos</div>
        <div class="upcoming-list" id="upcomingList">
          <div class="empty-state">Nenhum evento agendado 🎯</div>
        </div>
      </div>
    </aside>

    <!-- CALENDAR -->
    <main class="cal-panel">
      <div id="calendar"></div>
    </main>

  </div>

  <!-- MODAL DE EVENTO -->
  <div class="modal-backdrop" id="modalEvent">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">✨ Novo Evento</div>
        <button class="modal-close" id="closeModal">×</button>
      </div>
      <form id="eventForm">
        <div class="modal-body">
          <div class="field">
            <label for="eventTitle">Título</label>
            <input id="eventTitle" type="text" required placeholder="Ex: Reunião com cliente" autocomplete="off"/>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="eventDate">Data</label>
              <input id="eventDate" type="text" required placeholder="Selecione"/>
            </div>
            <div class="field">
              <label for="eventTime">Hora</label>
              <input id="eventTime" type="text" placeholder="Opcional"/>
            </div>
          </div>
          <div class="field">
            <label for="eventType">Tipo</label>
            <select id="eventType">
              <option value="reuniao">💼 Reunião</option>
              <option value="entrega">📦 Entrega</option>
              <option value="aniversario">🎂 Aniversário</option>
              <option value="outro">📌 Outro</option>
            </select>
          </div>
          <div class="field">
            <label>Cor</label>
            <div class="color-picker" id="colorPicker">
              <div class="color-dot active" data-color="#7c5cff" style="background:#7c5cff"></div>
              <div class="color-dot" data-color="#00d8ff" style="background:#00d8ff"></div>
              <div class="color-dot" data-color="#22c55e" style="background:#22c55e"></div>
              <div class="color-dot" data-color="#fbbf24" style="background:#fbbf24"></div>
              <div class="color-dot" data-color="#ff4c6a" style="background:#ff4c6a"></div>
              <div class="color-dot" data-color="#ff7eb9" style="background:#ff7eb9"></div>
              <div class="color-dot" data-color="#a78bfa" style="background:#a78bfa"></div>
              <div class="color-dot" data-color="#94a3b8" style="background:#94a3b8"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="deleteEventBtn" style="display:none;">Excluir</button>
          <button type="button" class="btn" id="cancelModal">Cancelar</button>
          <button type="submit" class="btn primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-backdrop" id="modalConfirm">
    <div class="modal confirm-modal">
      <div class="confirm-body">
        <div class="confirm-icon">⚠️</div>
        <p id="confirmText">Tem certeza?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" id="confirmCancel">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirmOk">Confirmar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ====== TEMA ======
    const savedTheme = localStorage.getItem('cal-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('btnTheme').addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('cal-theme', next);
    });

    // ====== TOAST ======
    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ====== TIPO -> ICON / COR PADRÃO ======
    const TYPE_META = {
      reuniao: { icon: '💼', color: '#7c5cff', label: 'Reunião' },
      entrega: { icon: '📦', color: '#22c55e', label: 'Entrega' },
      aniversario: { icon: '🎂', color: '#ff4c6a', label: 'Aniversário' },
      outro: { icon: '📌', color: '#fbbf24', label: 'Outro' }
    };

    // ====== FLATPICKR ======
    flatpickr("#eventDate", { dateFormat: "Y-m-d", locale: "pt", disableMobile: true });
    flatpickr("#eventTime", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, disableMobile: true });

    // ====== CALENDAR ======
    const calendarEl = document.getElementById('calendar');
    const stored = localStorage.getItem('fc-events');
    const initialEvents = stored ? JSON.parse(stored) : [];

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listMonth'
      },
      buttonText: { today: 'Hoje', month: 'Mês', week: 'Semana', list: 'Lista' },
      locale: 'pt-br',
      height: '100%',
      expandRows: true,
      selectable: true,
      editable: true,
      dayMaxEvents: 3,
      events: initialEvents,
      select: info => openEventModal(null, info.startStr),
      eventClick: info => openEventModal(info.event),
      eventDrop: () => { saveEvents(); showToast('Evento movido ✓'); },
      eventResize: () => { saveEvents(); },
      datesSet: () => updateStats(),
      eventDidMount: info => {
        info.el.setAttribute('title', info.event.title);
      }
    });
    calendar.render();
    updateStats();

    // ====== SEARCH & FILTER ======
    let currentTypeFilter = '';
    let currentSearch = '';

    document.getElementById('searchInput').addEventListener('input', e => {
      currentSearch = e.target.value.toLowerCase();
      applyFilters();
    });
    document.querySelectorAll('#typeChips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#typeChips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentTypeFilter = chip.dataset.type;
        applyFilters();
      });
    });
    function applyFilters() {
      calendar.getEvents().forEach(ev => {
        const matchSearch = !currentSearch || ev.title.toLowerCase().includes(currentSearch);
        const matchType = !currentTypeFilter || ev.extendedProps.type === currentTypeFilter;
        ev.setProp('display', matchSearch && matchType ? 'auto' : 'none');
      });
      updateStats();
    }

    // ====== MODAL ======
    const modal = document.getElementById('modalEvent');
    const form = document.getElementById('eventForm');
    const modalTitleEl = document.getElementById('modalTitle');
    const deleteBtn = document.getElementById('deleteEventBtn');
    let currentEvent = null;
    let selectedColor = '#7c5cff';

    document.getElementById('btnAdd').addEventListener('click', () => openEventModal());
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeConfirm(); } });

    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        selectedColor = dot.dataset.color;
      });
    });

    // Auto-cor ao trocar tipo
    document.getElementById('eventType').addEventListener('change', e => {
      if (!currentEvent) selectColor(TYPE_META[e.target.value].color);
    });

    function selectColor(c) {
      selectedColor = c;
      document.querySelectorAll('.color-dot').forEach(d => {
        d.classList.toggle('active', d.dataset.color === c);
      });
    }

    function openEventModal(event = null, dateStr = null) {
      currentEvent = event;
      form.reset();
      if (event) {
        modalTitleEl.textContent = '✏️ Editar Evento';
        deleteBtn.style.display = 'inline-flex';
        document.getElementById('eventTitle').value = event.title;
        document.getElementById('eventDate').value = event.startStr.slice(0, 10);
        if (event.startStr.includes('T')) {
          const dt = new Date(event.start);
          document.getElementById('eventTime').value = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
        }
        document.getElementById('eventType').value = event.extendedProps.type || 'outro';
        selectColor(event.backgroundColor || '#7c5cff');
      } else {
        modalTitleEl.textContent = '✨ Novo Evento';
        deleteBtn.style.display = 'none';
        if (dateStr) document.getElementById('eventDate').value = dateStr;
        document.getElementById('eventType').value = 'reuniao';
        selectColor('#7c5cff');
      }
      modal.classList.add('show');
      setTimeout(() => document.getElementById('eventTitle').focus(), 200);
    }
    function closeModal() { modal.classList.remove('show'); }

    form.addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('eventTitle').value.trim();
      const date = document.getElementById('eventDate').value;
      const time = document.getElementById('eventTime').value;
      const type = document.getElementById('eventType').value;
      const color = selectedColor;
      if (!title || !date) return;
      const startStr = time ? `${date}T${time}` : date;
      if (currentEvent) {
        currentEvent.setProp('title', title);
        currentEvent.setStart(startStr);
        currentEvent.setAllDay(!time);
        currentEvent.setExtendedProp('type', type);
        currentEvent.setProp('backgroundColor', color);
        currentEvent.setProp('borderColor', color);
        showToast('Evento atualizado ✓');
      } else {
        calendar.addEvent({
          id: String(Date.now()),
          title,
          start: startStr,
          allDay: !time,
          extendedProps: { type },
          backgroundColor: color,
          borderColor: color
        });
        showToast('Evento criado ✓');
      }
      saveEvents();
      closeModal();
    });

    // ====== CONFIRM MODAL ======
    const confirmModal = document.getElementById('modalConfirm');
    const confirmText = document.getElementById('confirmText');
    let confirmCb = null;
    function askConfirm(msg, cb) {
      confirmText.textContent = msg;
      confirmCb = cb;
      confirmModal.classList.add('show');
    }
    function closeConfirm() { confirmModal.classList.remove('show'); confirmCb = null; }
    document.getElementById('confirmCancel').addEventListener('click', closeConfirm);
    confirmModal.addEventListener('click', e => { if (e.target === confirmModal) closeConfirm(); });
    document.getElementById('confirmOk').addEventListener('click', () => {
      if (confirmCb) confirmCb();
      closeConfirm();
    });

    deleteBtn.addEventListener('click', () => {
      askConfirm('Excluir este evento permanentemente?', () => {
        currentEvent.remove();
        saveEvents();
        closeModal();
        showToast('Evento excluído');
      });
    });

    // ====== PERSISTÊNCIA ======
    function saveEvents() {
      const evts = calendar.getEvents().map(ev => ({
        id: ev.id,
        title: ev.title,
        start: ev.startStr,
        allDay: ev.allDay,
        backgroundColor: ev.backgroundColor,
        borderColor: ev.borderColor,
        extendedProps: { type: ev.extendedProps.type || 'outro' }
      }));
      localStorage.setItem('fc-events', JSON.stringify(evts));
      updateStats();
    }

    // ====== STATS + LISTA ======
    function updateStats() {
      const all = calendar.getEvents().filter(ev => ev.display !== 'none');
      document.getElementById('statTotal').textContent = all.length;

      const view = calendar.view;
      const start = view.currentStart, end = view.currentEnd;
      const inMonth = all.filter(ev => ev.start >= start && ev.start < end).length;
      document.getElementById('statMonth').textContent = inMonth;

      const list = document.getElementById('upcomingList');
      const now = new Date();
      const upcoming = all
        .filter(ev => new Date(ev.start) >= now)
        .sort((a, b) => new Date(a.start) - new Date(b.start))
        .slice(0, 10);

      if (upcoming.length === 0) {
        list.innerHTML = '<div class="empty-state">Nenhum evento agendado 🎯</div>';
        return;
      }
      list.innerHTML = upcoming.map(ev => {
        const type = ev.extendedProps.type || 'outro';
        const meta = TYPE_META[type] || TYPE_META.outro;
        const d = new Date(ev.start);
        const dateStr = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
        const timeStr = ev.allDay ? 'Dia inteiro' : d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        return `
          <div class="event-item" data-id="${ev.id}">
            <span class="stripe" style="background:${ev.backgroundColor || meta.color}"></span>
            <div class="ev-icon">${meta.icon}</div>
            <div class="ev-content">
              <div class="ev-title">${escapeHtml(ev.title)}</div>
              <div class="ev-meta">${dateStr} · ${timeStr}</div>
            </div>
          </div>
        `;
      }).join('');
      list.querySelectorAll('.event-item').forEach(el => {
        el.addEventListener('click', () => {
          const ev = calendar.getEventById(el.dataset.id);
          if (ev) {
            calendar.gotoDate(ev.start);
            openEventModal(ev);
          }
        });
      });
    }
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ====== EXPORT .ICS ======
    document.getElementById('btnExport').addEventListener('click', () => {
      const events = calendar.getEvents();
      if (!events.length) { showToast('Nenhum evento para exportar'); return; }
      const pad = n => String(n).padStart(2, '0');
      const fmt = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
      let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Belinelo//Calendar//PT\r\n';
      events.forEach(ev => {
        const start = ev.start;
        const end = ev.end || new Date(start.getTime() + 60*60*1000);
        ics += `BEGIN:VEVENT\r\nUID:${ev.id}@belinelo\r\nDTSTAMP:${fmt(new Date())}\r\nDTSTART:${fmt(start)}\r\nDTEND:${fmt(end)}\r\nSUMMARY:${ev.title}\r\nEND:VEVENT\r\n`;
      });
      ics += 'END:VCALENDAR';
      const blob = new Blob([ics], { type: 'text/calendar' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `calendario_${Date.now()}.ics`; a.click();
      URL.revokeObjectURL(url);
      showToast('Calendário exportado ✓');
    });

    // Resize handling
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => calendar.updateSize(), 150);
    });
  </script>
</body>
</html>
