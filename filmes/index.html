<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NETFLIX · Belinelo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --bg-2: #141414;
      --surface: rgba(255,255,255,0.06);
      --surface-2: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.22);
      --text: #ffffff;
      --text-dim: #b3b3b3;
      --text-dim-2: #737373;
      --brand: #e50914;
      --brand-dark: #b00710;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ============ HEADER ============ */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: linear-gradient(180deg, rgba(0,0,0,0.85), transparent);
      transition: background .3s ease, padding .3s ease;
    }
    header.scrolled {
      background: #141414;
      padding: 12px 4%;
    }
    .logo {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--brand);
      letter-spacing: -0.04em;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .nav-center {
      display: flex; gap: 22px;
      flex: 1;
      justify-content: center;
    }
    .nav-center a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color .2s ease;
      white-space: nowrap;
    }
    .nav-center a:hover, .nav-center a.active { color: var(--text); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .search-trigger {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      transition: opacity .2s ease;
    }
    .search-trigger:hover { opacity: 0.7; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      transition: color .2s ease;
    }
    .back-link:hover { color: var(--text); }

    /* ============ SEARCH OVERLAY ============ */
    .search-overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      padding: 80px 4% 40px;
      overflow-y: auto;
    }
    .search-overlay.open { opacity: 1; pointer-events: auto; }
    .search-overlay-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .search-header {
      display: flex; align-items: center; gap: 16px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .search-header svg { color: var(--text-dim-2); flex-shrink: 0; }
    .search-header input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 300;
      outline: none;
      font-family: inherit;
    }
    .search-header input::placeholder { color: var(--text-dim-2); }
    .search-header button {
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .search-header button:hover { color: var(--text); }
    .search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }
    .search-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim-2);
      font-size: 14px;
    }

    /* ============ HERO ============ */
    .hero {
      position: relative;
      min-height: 86vh;
      display: flex;
      align-items: flex-end;
      padding: 0 4% 12vh;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center 20%;
      transition: opacity 1s ease, transform 8s ease;
      transform: scale(1.05);
      opacity: 0;
    }
    .hero-bg.active { opacity: 1; transform: scale(1); }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background:
        linear-gradient(90deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.6) 35%, rgba(10,10,10,0.2) 60%, transparent 100%),
        linear-gradient(180deg, transparent 0%, transparent 60%, var(--bg) 100%);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 640px;
      animation: heroFade .8s ease;
    }
    @keyframes heroFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-meta {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      background: rgba(229,9,20,0.18);
      border: 1px solid var(--brand);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fda4a4;
    }
    .hero-rating {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .hero-rating .star { color: #fbbf24; }
    .hero-year {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }
    .hero-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2.2rem, 5.5vw, 4.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }
    .hero-overview {
      font-size: clamp(.95rem, 1.2vw, 1.05rem);
      line-height: 1.6;
      color: var(--text-dim);
      max-width: 560px;
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s ease;
      font-family: inherit;
    }
    .btn-primary {
      background: white;
      color: black;
    }
    .btn-primary:hover {
      background: rgba(255,255,255,0.85);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(115,115,115,0.5);
      backdrop-filter: blur(10px);
      color: white;
    }
    .btn-secondary:hover {
      background: rgba(115,115,115,0.7);
    }
    .btn-brand {
      background: var(--brand);
      color: white;
    }
    .btn-brand:hover { background: var(--brand-dark); }

    /* Hero indicators */
    .hero-indicators {
      position: absolute;
      bottom: 14vh; right: 4%;
      display: flex; gap: 6px;
      z-index: 3;
    }
    .hero-indicators button {
      width: 28px; height: 3px;
      background: rgba(255,255,255,0.3);
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      transition: background .3s ease, width .3s ease;
    }
    .hero-indicators button.active {
      background: var(--brand);
      width: 40px;
    }

    /* ============ GENRES ============ */
    .genres-bar {
      position: relative;
      padding: 28px 4% 12px;
      margin-top: -8vh;
      z-index: 5;
    }
    .genres-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 6px;
    }
    .genres-scroll::-webkit-scrollbar { display: none; }
    .genre-chip {
      flex-shrink: 0;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      font-family: inherit;
    }
    .genre-chip:hover {
      color: var(--text);
      border-color: var(--border-strong);
      background: var(--surface-2);
    }
    .genre-chip.active {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
      font-weight: 600;
    }

    /* ============ ROWS ============ */
    main { padding: 24px 0 80px; }
    .row {
      margin-bottom: 48px;
      padding-left: 4%;
      position: relative;
    }
    .row-header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 14px;
      padding-right: 4%;
    }
    .row-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .row-subtitle {
      font-size: 12px;
      color: var(--text-dim-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .row-scroll-container {
      position: relative;
      overflow: hidden;
    }
    .row-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
      padding: 4px 4% 24px 0;
    }
    .row-scroll::-webkit-scrollbar { display: none; }

    .scroll-btn {
      position: absolute;
      top: 0; bottom: 28px;
      width: 50px;
      background: linear-gradient(90deg, rgba(10,10,10,0.85), transparent);
      border: none;
      color: white;
      cursor: pointer;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: flex-start;
      transition: opacity .3s ease;
      padding-left: 8px;
    }
    .scroll-btn.right {
      right: 0;
      background: linear-gradient(-90deg, rgba(10,10,10,0.85), transparent);
      justify-content: flex-end;
      padding-right: 8px;
      padding-left: 0;
    }
    .scroll-btn:hover { background-color: rgba(0,0,0,0.5); }
    .scroll-btn svg { width: 28px; height: 28px; }
    .row-scroll-container:hover .scroll-btn.visible { display: flex; }
    .scroll-btn.left { left: 0; }

    /* ============ CARDS ============ */
    .card {
      flex-shrink: 0;
      width: 200px;
      position: relative;
      cursor: pointer;
      transition: transform .25s ease;
      border-radius: 4px;
      overflow: hidden;
    }
    .card:hover {
      transform: scale(1.05);
      z-index: 2;
    }
    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }
    .card-skeleton {
      width: 200px;
      aspect-ratio: 2/3;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      flex-shrink: 0;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .card-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 14px 12px 12px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 50%, rgba(0,0,0,0.95) 100%);
      opacity: 0;
      transition: opacity .25s ease;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-overlay-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-overlay-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .card-rating {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 6px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      font-weight: 600;
    }
    .card-rating.high { color: #fbbf24; }
    .card-rating.mid { color: #a3e635; }
    .card-actions {
      display: flex; gap: 4px;
      margin-top: 4px;
    }
    .card-action {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .2s ease;
    }
    .card-action:hover {
      background: white;
      color: black;
      transform: scale(1.1);
    }
    .card-action.fav.active {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    .card-rank {
      position: absolute;
      top: 4px; left: 4px;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 2.6rem;
      line-height: 1;
      color: white;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
      z-index: 1;
      letter-spacing: -0.04em;
    }

    /* ============ TRAILER MODAL ============ */
    .trailer-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      padding: 20px;
    }
    .trailer-modal.open { opacity: 1; pointer-events: auto; }
    .trailer-modal .trailer-wrap {
      width: 100%; max-width: 960px;
      position: relative;
    }
    .trailer-modal iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .trailer-close {
      position: absolute;
      top: -44px; right: 0;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: white;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .trailer-close:hover { background: var(--brand); border-color: var(--brand); }

    /* ============ TOAST ============ */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,20,20,0.95);
      border: 1px solid var(--border-strong);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      opacity: 0;
      transition: all .3s ease;
      z-index: 1000;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ============ FAVORITES TOGGLE ============ */
    .fav-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
    }
    .fav-toggle:hover { color: var(--text); border-color: var(--border-strong); }

    .hidden { display: none !important; }

    @media (max-width: 700px) {
      header { padding: 14px 4%; }
      .nav-center { display: none; }
      .hero { min-height: 70vh; padding-bottom: 8vh; }
      .card { width: 150px; }
      .card-skeleton { width: 150px; }
      .row { margin-bottom: 36px; }
      .row-title { font-size: 1.1rem; }
      .hero-indicators { bottom: 10vh; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header id="header">
    <div style="display:flex; align-items:center; gap:32px;">
      <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">NETFLIX</div>
      <nav class="nav-center" style="justify-content:flex-start;flex:initial;">
        <a href="#" class="active" onclick="scrollToRow('row-popular')">Início</a>
        <a href="#" onclick="scrollToRow('row-trending')">Em alta</a>
        <a href="#" onclick="scrollToRow('row-top')">Top 10</a>
        <a href="#" onclick="scrollToRow('row-upcoming')">Em breve</a>
        <a href="#" onclick="scrollToRow('row-favs')">Minha Lista</a>
      </nav>
    </div>
    <div class="nav-right">
      <button class="search-trigger" id="searchTrigger" title="Buscar (/)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <a href="../index.html" class="back-link" title="Voltar aos projetos">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Sair
      </a>
    </div>
  </header>

  <!-- SEARCH OVERLAY -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-overlay-inner">
      <div class="search-header">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Buscar filmes, séries, atores..." autocomplete="off"/>
        <button id="searchClose" title="Fechar (Esc)">×</button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-empty">Digite algo para começar a buscar 🎬</div>
      </div>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-content" id="heroContent"></div>
    <div class="hero-indicators" id="heroIndicators"></div>
  </section>

  <!-- GENRE FILTERS -->
  <div class="genres-bar">
    <div class="genres-scroll" id="genreFilters">
      <button class="genre-chip active" data-id="">Todos</button>
    </div>
  </div>

  <!-- ROWS -->
  <main>
    <section class="row">
      <div class="row-header">
        <h2 class="row-title">🔥 Em alta hoje</h2>
        <span class="row-subtitle">Tendência</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-trending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-trending"></div>
        <button class="scroll-btn right" data-target="row-trending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>

    <section class="row">
      <div class="row-header">
        <h2 class="row-title">⭐ Populares</h2>
        <span class="row-subtitle">Mais assistidos</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-popular"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-popular"></div>
        <button class="scroll-btn right" data-target="row-popular"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>

    <section class="row">
      <div class="row-header">
        <h2 class="row-title">🏆 Top 10</h2>
        <span class="row-subtitle">Mais bem avaliados</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-top"></div>
        <button class="scroll-btn right" data-target="row-top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>

    <section class="row">
      <div class="row-header">
        <h2 class="row-title">🎬 Em cartaz</h2>
        <span class="row-subtitle">Nos cinemas</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-nowplay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-nowplay"></div>
        <button class="scroll-btn right" data-target="row-nowplay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>

    <section class="row">
      <div class="row-header">
        <h2 class="row-title">🚀 Em breve</h2>
        <span class="row-subtitle">Próximos lançamentos</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-upcoming"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-upcoming"></div>
        <button class="scroll-btn right" data-target="row-upcoming"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>

    <section class="row hidden" id="genreSection">
      <div class="row-header">
        <h2 class="row-title" id="genreTitle">Por gênero</h2>
        <span class="row-subtitle">Filtrado</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-genre"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-genre"></div>
        <button class="scroll-btn right" data-target="row-genre"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>

    <section class="row hidden" id="favSection">
      <div class="row-header">
        <h2 class="row-title">⭐ Meus Favoritos</h2>
        <span class="row-subtitle" id="favCount">0 itens</span>
      </div>
      <div class="row-scroll-container">
        <button class="scroll-btn left" data-target="row-favs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll" id="row-favs"></div>
        <button class="scroll-btn right" data-target="row-favs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>
  </main>

  <!-- TRAILER MODAL -->
  <div class="trailer-modal" id="trailerModal">
    <div class="trailer-wrap">
      <button class="trailer-close" id="trailerClose">×</button>
      <iframe id="trailerFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_KEY = 'fb0021679c70d3e76017cbc60ac656c6';
    const IMG_W500 = 'https://image.tmdb.org/t/p/w500';
    const IMG_ORIG = 'https://image.tmdb.org/t/p/original';
    const POSTER_FALLBACK = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="%23202020" width="200" height="300"/><text x="50%" y="50%" text-anchor="middle" fill="%23666" font-family="sans-serif" font-size="14">Sem poster</text></svg>';

    // ===== TOAST =====
    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ===== SCROLL HEADER =====
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
    });

    // ===== HERO ROTATIVO =====
    let heroMovies = [];
    let heroIdx = 0;
    let heroTimer = null;

    async function initHero() {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        heroMovies = data.results.filter(m => m.backdrop_path).slice(0, 5);
        renderHero(0);
        renderIndicators();
        startHeroAutoplay();
      } catch {}
    }

    function renderHero(idx) {
      const m = heroMovies[idx];
      if (!m) return;
      heroIdx = idx;
      const bg = document.getElementById('heroBg');
      bg.classList.remove('active');
      setTimeout(() => {
        bg.style.backgroundImage = `url(${IMG_ORIG + m.backdrop_path})`;
        bg.classList.add('active');
      }, 50);

      const year = m.release_date ? m.release_date.slice(0,4) : '';
      const rating = (m.vote_average || 0).toFixed(1);
      document.getElementById('heroContent').innerHTML = `
        <div class="hero-meta">
          <span class="hero-badge">🎬 Em destaque</span>
          <span class="hero-rating"><span class="star">★</span> ${rating}</span>
          ${year ? `<span class="hero-year">${year}</span>` : ''}
        </div>
        <h1 class="hero-title">${escapeHtml(m.title)}</h1>
        <p class="hero-overview">${escapeHtml(m.overview || 'Sem descrição disponível.')}</p>
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="playTrailer(${m.id})">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Assistir Trailer
          </button>
          <button class="btn btn-secondary" onclick="window.location.href='detalhes.html?id=${m.id}&type=movie'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            Mais Detalhes
          </button>
        </div>
      `;
      updateIndicators();
    }

    function renderIndicators() {
      const c = document.getElementById('heroIndicators');
      c.innerHTML = heroMovies.map((_, i) => `<button data-idx="${i}" class="${i===0?'active':''}"></button>`).join('');
      c.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          renderHero(parseInt(b.dataset.idx, 10));
          restartHeroAutoplay();
        });
      });
    }
    function updateIndicators() {
      document.querySelectorAll('#heroIndicators button').forEach((b, i) => {
        b.classList.toggle('active', i === heroIdx);
      });
    }
    function startHeroAutoplay() {
      heroTimer = setInterval(() => {
        renderHero((heroIdx + 1) % heroMovies.length);
      }, 7000);
    }
    function restartHeroAutoplay() {
      clearInterval(heroTimer);
      startHeroAutoplay();
    }

    // ===== FAVORITES =====
    function getFavs() { return JSON.parse(localStorage.getItem('favoritos') || '[]'); }
    function setFavs(f) { localStorage.setItem('favoritos', JSON.stringify(f)); }
    function isFav(id) { return getFavs().some(f => String(f.id) === String(id)); }
    function toggleFav(movie) {
      let favs = getFavs();
      const exists = favs.find(f => String(f.id) === String(movie.id));
      if (exists) {
        favs = favs.filter(f => String(f.id) !== String(movie.id));
        showToast('Removido dos favoritos');
      } else {
        favs.push({ id: movie.id, title: movie.title || movie.name, poster_path: movie.poster_path, vote_average: movie.vote_average, release_date: movie.release_date });
        showToast('⭐ Adicionado aos favoritos');
      }
      setFavs(favs);
      renderFavSection();
      // Update all matching fav buttons on page
      document.querySelectorAll(`[data-fav-id="${movie.id}"]`).forEach(b => {
        b.classList.toggle('active', !exists);
        b.innerHTML = !exists ? '★' : '+';
      });
    }

    function renderFavSection() {
      const favs = getFavs();
      const sec = document.getElementById('favSection');
      if (favs.length === 0) {
        sec.classList.add('hidden');
        return;
      }
      sec.classList.remove('hidden');
      document.getElementById('favCount').textContent = `${favs.length} ${favs.length === 1 ? 'item' : 'itens'}`;
      renderMovies('row-favs', favs);
    }

    // ===== CARD RENDER =====
    function ratingClass(r) {
      if (r >= 7.5) return 'high';
      if (r >= 6) return 'mid';
      return '';
    }
    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function renderMovies(rowId, movies, showRank = false) {
      const row = document.getElementById(rowId);
      if (!row) return;
      row.innerHTML = '';
      movies.forEach((m, idx) => {
        const title = m.title || m.name || 'Sem título';
        const poster = m.poster_path ? IMG_W500 + m.poster_path : POSTER_FALLBACK;
        const year = m.release_date ? m.release_date.slice(0,4) : (m.first_air_date?.slice(0,4) || '');
        const rating = (m.vote_average || 0).toFixed(1);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          ${showRank && idx < 10 ? `<div class="card-rank">${idx + 1}</div>` : ''}
          <img class="card-poster" src="${poster}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.src='${POSTER_FALLBACK}'"/>
          <div class="card-overlay">
            <div class="card-overlay-title">${escapeHtml(title)}</div>
            <div class="card-overlay-meta">
              <span class="card-rating ${ratingClass(m.vote_average || 0)}">★ ${rating}</span>
              <span>${year}</span>
            </div>
            <div class="card-actions">
              <button class="card-action" title="Detalhes" data-action="info">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              </button>
              <button class="card-action" title="Trailer" data-action="trailer">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </button>
              <button class="card-action fav ${isFav(m.id) ? 'active' : ''}" data-fav-id="${m.id}" data-action="fav" title="Favoritar">${isFav(m.id) ? '★' : '+'}</button>
            </div>
          </div>
        `;
        // Click in poster goes to details
        card.querySelector('.card-poster').addEventListener('click', () => {
          window.location.href = `detalhes.html?id=${m.id}&type=movie`;
        });
        // Action buttons
        card.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const a = btn.dataset.action;
            if (a === 'info') window.location.href = `detalhes.html?id=${m.id}&type=movie`;
            else if (a === 'trailer') playTrailer(m.id);
            else if (a === 'fav') toggleFav(m);
          });
        });
        row.appendChild(card);
      });
      updateScrollButtons(rowId);
    }

    function showSkeletons(rowId, count = 8) {
      const row = document.getElementById(rowId);
      if (!row) return;
      row.innerHTML = Array.from({length: count}).map(() => '<div class="card-skeleton"></div>').join('');
    }

    // ===== LOAD ROWS =====
    async function loadRow(endpoint, rowId, showRank = false) {
      showSkeletons(rowId);
      try {
        const res = await fetch(`https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        renderMovies(rowId, data.results || [], showRank);
      } catch {
        document.getElementById(rowId).innerHTML = '';
      }
    }

    // ===== TRAILER =====
    async function playTrailer(movieId) {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        let trailer = data.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        if (!trailer) {
          const resEn = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}`);
          const dataEn = await resEn.json();
          trailer = dataEn.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        }
        if (!trailer) { showToast('Trailer indisponível'); return; }
        document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
        document.getElementById('trailerModal').classList.add('open');
      } catch {
        showToast('Erro ao carregar trailer');
      }
    }
    document.getElementById('trailerClose').addEventListener('click', closeTrailer);
    document.getElementById('trailerModal').addEventListener('click', e => {
      if (e.target.id === 'trailerModal') closeTrailer();
    });
    function closeTrailer() {
      document.getElementById('trailerFrame').src = '';
      document.getElementById('trailerModal').classList.remove('open');
    }

    // ===== GENRES =====
    async function loadGenres() {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const c = document.getElementById('genreFilters');
        data.genres.forEach(g => {
          const b = document.createElement('button');
          b.className = 'genre-chip';
          b.dataset.id = g.id;
          b.textContent = g.name;
          c.appendChild(b);
        });
        c.querySelectorAll('.genre-chip').forEach(btn => {
          btn.addEventListener('click', () => {
            c.querySelectorAll('.genre-chip').forEach(x => x.classList.remove('active'));
            btn.classList.add('active');
            if (btn.dataset.id) {
              loadGenreSection(btn.dataset.id, btn.textContent);
            } else {
              document.getElementById('genreSection').classList.add('hidden');
            }
          });
        });
      } catch {}
    }
    async function loadGenreSection(genreId, genreName) {
      const sec = document.getElementById('genreSection');
      sec.classList.remove('hidden');
      document.getElementById('genreTitle').textContent = `🎭 ${genreName}`;
      showSkeletons('row-genre');
      try {
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&with_genres=${genreId}&sort_by=popularity.desc`);
        const data = await res.json();
        renderMovies('row-genre', data.results || []);
        sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch {}
    }

    // ===== SCROLL BUTTONS =====
    function setupScrollButtons() {
      document.querySelectorAll('.scroll-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const row = document.getElementById(btn.dataset.target);
          if (!row) return;
          row.scrollBy({ left: row.clientWidth * 0.8 * (btn.classList.contains('left') ? -1 : 1), behavior: 'smooth' });
        });
      });
      document.querySelectorAll('.row-scroll').forEach(row => {
        row.addEventListener('scroll', () => updateScrollButtons(row.id));
      });
    }
    function updateScrollButtons(rowId) {
      const row = document.getElementById(rowId);
      if (!row) return;
      const container = row.parentElement;
      const left = container.querySelector('.scroll-btn.left');
      const right = container.querySelector('.scroll-btn.right');
      if (!left || !right) return;
      const canScroll = row.scrollWidth > row.clientWidth + 10;
      if (!canScroll) {
        left.classList.remove('visible');
        right.classList.remove('visible');
        return;
      }
      left.classList.toggle('visible', row.scrollLeft > 10);
      right.classList.toggle('visible', row.scrollLeft + row.clientWidth < row.scrollWidth - 10);
    }

    // ===== SEARCH OVERLAY =====
    const searchOverlay = document.getElementById('searchOverlay');
    const searchInput = document.getElementById('searchInput');
    document.getElementById('searchTrigger').addEventListener('click', () => {
      searchOverlay.classList.add('open');
      setTimeout(() => searchInput.focus(), 100);
    });
    document.getElementById('searchClose').addEventListener('click', () => searchOverlay.classList.remove('open'));
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        searchOverlay.classList.remove('open');
        closeTrailer();
      }
      if (e.key === '/' && !searchOverlay.classList.contains('open')) {
        e.preventDefault();
        document.getElementById('searchTrigger').click();
      }
    });

    let searchTimeout;
    searchInput.addEventListener('input', e => {
      clearTimeout(searchTimeout);
      const q = e.target.value.trim();
      const results = document.getElementById('searchResults');
      if (!q) {
        results.innerHTML = '<div class="search-empty">Digite algo para começar a buscar 🎬</div>';
        return;
      }
      searchTimeout = setTimeout(async () => {
        try {
          const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(q)}`);
          const data = await res.json();
          const filtered = (data.results || []).filter(r => (r.media_type === 'movie' || r.media_type === 'tv') && r.poster_path);
          if (filtered.length === 0) {
            results.innerHTML = '<div class="search-empty">Nenhum resultado para "' + escapeHtml(q) + '" 😢</div>';
            return;
          }
          results.innerHTML = '';
          filtered.slice(0, 24).forEach(m => {
            const title = m.title || m.name;
            const poster = m.poster_path ? IMG_W500 + m.poster_path : POSTER_FALLBACK;
            const year = (m.release_date || m.first_air_date || '').slice(0,4);
            const rating = (m.vote_average || 0).toFixed(1);
            const card = document.createElement('div');
            card.className = 'card';
            card.style.width = '100%';
            card.innerHTML = `
              <img class="card-poster" src="${poster}" alt="${escapeHtml(title)}"/>
              <div class="card-overlay">
                <div class="card-overlay-title">${escapeHtml(title)}</div>
                <div class="card-overlay-meta">
                  <span class="card-rating ${ratingClass(m.vote_average || 0)}">★ ${rating}</span>
                  <span>${year}</span>
                </div>
              </div>
            `;
            card.addEventListener('click', () => {
              window.location.href = `detalhes.html?id=${m.id}&type=${m.media_type}`;
            });
            results.appendChild(card);
          });
        } catch {
          results.innerHTML = '<div class="search-empty">Erro na busca</div>';
        }
      }, 350);
    });

    // ===== NAV =====
    function scrollToRow(id) {
      const el = document.getElementById(id);
      if (el && !el.closest('section').classList.contains('hidden')) {
        el.closest('section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ===== INIT =====
    initHero();
    loadGenres();
    loadRow('trending/movie/week', 'row-trending');
    loadRow('movie/popular', 'row-popular');
    loadRow('movie/top_rated', 'row-top', true);
    loadRow('movie/now_playing', 'row-nowplay');
    loadRow('movie/upcoming', 'row-upcoming');
    renderFavSection();
    setupScrollButtons();

    window.addEventListener('resize', () => {
      document.querySelectorAll('.row-scroll').forEach(r => updateScrollButtons(r.id));
    });
  </script>
</body>
</html>
